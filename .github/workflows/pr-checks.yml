name: PR Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Unit and integration tests
        run: bun run test

      - name: Generate i18n types
        run: bun run i18n:types

      - name: Validate i18n
        run: node scripts/check-i18n.js

      - name: Build renderer
        run: bun run build:renderer:web

      - name: Build server
        run: bun run build:server
